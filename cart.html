<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart - SkillBridge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h2 class="page-title">Your Cart</h2>
        <p>Review your selected handcrafted items before checkout.</p>
    </header>

    <main class="products-section">
        <div id="cart-items" class="products">
            <!-- Items will be injected by script.js -->
            <p style="grid-column: 1/-1; color: var(--text-muted);">Your cart is currently empty.</p>
        </div>

        <div style="margin-top: 40px; text-align: right; max-width: 1000px; margin-left: auto; margin-right: auto;">
            <h3 id="total" style="font-size: 1.5rem; margin-bottom: 20px;">Total: ₹0</h3>
            <a href="payment.html" class="back"
                style="background: var(--primary); color: white; border: none; padding: 15px 40px;">Proceed to
                Payment</a>
        </div>

        <a href="index.html" class="back">⬅ Continue Shopping</a>
    </main>

    <script src="script.js"></script>
</body>

</html>
